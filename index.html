<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>QuickAnim - 极速动效生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #050505 100%); 
            color: #fff;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }
        /* 预览画布 */
        #canvas {
            width: 1280px;
            height: 720px;
            background: rgba(0,0,0,0.8);
            border: 2px solid rgba(34, 211, 238, 0.2);
            position: relative;
            transform: scale(0.6);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }
        /* 数字样式 */
        #number-display {
            font-size: 160px;
            font-weight: bold;
            color: #22d3ee;
            text-shadow: 0 0 40px rgba(34, 211, 238, 0.4);
        }
        /* 控制条样式 */
        .controls {
            width: 800px;
            margin-top: -100px;
            z-index: 10;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #22d3ee;
        }
    </style>
</head>
<body>

    <div id="canvas">
        <div id="number-display">0</div>
        <svg width="200" height="100" viewBox="0 0 100 50">
            <path id="arrow-path" d="M10 25 L90 25 M75 10 L90 25 L75 40" 
                  stroke="#22d3ee" stroke-width="5" fill="none" stroke-linecap="round" />
        </svg>
        <div style="margin-top: 40px; color: #164e63; letter-spacing: 5px;">DATA ANALYTICS // AE ENGINE</div>
    </div>

    <div class="controls">
        <input type="range" id="frame-slider" min="0" max="150" value="0">
        <div style="display: flex; justify-content: space-between; color: #64748b; font-size: 12px; margin-top: 10px;">
            <span>START: 0F</span>
            <span id="frame-counter" style="color: #22d3ee;">FRAME: 0</span>
            <span>END: 150F</span>
        </div>
    </div>

    <script>
        // --- 核心逻辑：原生 JS 驱动 ---
        const slider = document.getElementById('frame-slider');
        const numDisplay = document.getElementById('number-display');
        const frameCounter = document.getElementById('frame-counter');
        const arrowPath = document.getElementById('arrow-path');

        // 设置路径长度
        const pathLength = arrowPath.getTotalLength();
        arrowPath.style.strokeDasharray = pathLength;

        // 插值函数
        function interpolate(value, inMin, inMax, outMin, outMax) {
            if (value <= inMin) return outMin;
            if (value >= inMax) return outMax;
            return outMin + (outMax - outMin) * (value - inMin) / (inMax - inMin);
        }

        // 刷新画面
        function update(frame) {
            // 1. 更新帧计数
            frameCounter.innerText = `FRAME: ${frame}`;

            // 2. 更新数字 (第10帧到第100帧，从0增加到1,250,800)
            const numValue = Math.floor(interpolate(frame, 10, 100, 0, 1250800));
            numDisplay.innerText = numValue.toLocaleString();

            // 3. 更新箭头 (第20帧到第60帧生长)
            const progress = interpolate(frame, 20, 60, 0, 1);
            arrowPath.style.strokeDashoffset = pathLength * (1 - progress);
            arrowPath.style.opacity = progress > 0 ? 1 : 0;
        }

        // 自动播放循环
        let currentFrame = 0;
        function animate() {
            currentFrame = (currentFrame + 1) % 151;
            slider.value = currentFrame;
            update(currentFrame);
            requestAnimationFrame(animate);
        }

        // 监听手动拖动
        slider.addEventListener('input', (e) => {
            currentFrame = parseInt(e.target.value);
            update(currentFrame);
        });

        // 启动动画
        animate();
    </script>
</body>
</html>
