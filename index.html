<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Remotion Data Anim - GitHub Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        /* 模拟视频容器预览 */
        #canvas-wrapper {
            width: 1280px;
            height: 720px;
            background: #000;
            position: relative;
            transform: scale(0.6); /* 缩小显示以适应屏幕 */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="no-js-hint" style="color: white; font-family: sans-serif; position: absolute;">
        正在加载动效引擎，请稍候... (如果长时间全黑，请检查网络)
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // 隐藏提示
        document.getElementById('no-js-hint').style.display = 'none';

        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- Remotion 核心算法：插值函数 ---
        const interpolate = (frame, input, output) => {
            const [inMin, inMax] = input;
            const [outMin, outMax] = output;
            if (frame <= inMin) return outMin;
            if (frame >= inMax) return outMax;
            const progress = (frame - inMin) / (inMax - inMin);
            return outMin + (outMax - outMin) * progress;
        };

        const App = () => {
            const [frame, setFrame] = useState(0);
            const fps = 30;
            const durationFrames = 150; // 5秒

            useEffect(() => {
                const timer = setInterval(() => {
                    setFrame(prev => (prev + 1) % durationFrames);
                }, 1000 / fps);
                return () => clearInterval(timer);
            }, []);

            // 计算当前数字（从 0 到 99,840）
            const currentNum = Math.floor(interpolate(frame, [10, 80], [0, 99840]));
            // 计算箭头生长进度
            const pathProgress = interpolate(frame, [20, 50], [0, 1]);

            return (
                <div className="flex flex-col items-center">
                    <div id="canvas-wrapper">
                        {/* 场景层 */}
                        <div className="absolute inset-0 flex flex-col items-center justify-center p-20">
                            
                            {/* 1. AE 风格滚动数字 */}
                            <motion.div 
                                style={{ 
                                    fontSize: '140px', 
                                    fontWeight: '900', 
                                    fontFamily: 'monospace',
                                    color: '#22d3ee',
                                    textShadow: '0 0 30px rgba(34,211,238,0.4)'
                                }}
                            >
                                {currentNum.toLocaleString()}
                            </motion.div>

                            {/* 2. 动态生长箭头 */}
                            <svg width="200" height="100" viewBox="0 0 100 50" className="mt-10">
                                <path
                                    d="M10 25 L90 25 M75 10 L90 25 L75 40"
                                    fill="none"
                                    stroke="#22d3ee"
                                    strokeWidth="5"
                                    strokeDasharray="100"
                                    strokeDashoffset={100 - (pathProgress * 100)}
                                    strokeLinecap="round"
                                />
                            </svg>

                            {/* 底部装饰 */}
                            <div className="absolute bottom-10 left-10 text-cyan-900 font-bold tracking-widest uppercase">
                                Remote Generation Active // Frame: {frame}
                            </div>
                        </div>

                        {/* 模拟 AE 扫描线叠加层 */}
                        <div className="absolute inset-0 pointer-events-none border-[20px] border-white/5 opacity-30"></div>
                    </div>

                    {/* 控制台操作区 */}
                    <div className="mt-8 bg-slate-800/50 p-6 rounded-2xl border border-white/10 w-full max-w-2xl">
                        <input 
                            type="range" min="0" max={durationFrames - 1} value={frame}
                            onChange={(e) => setFrame(parseInt(e.target.value))}
                            className="w-full h-3 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-cyan-400"
                        />
                        <div className="flex justify-between mt-4 text-cyan-200/50 font-mono text-xs">
                            <span>TIMELINE: 00:00</span>
                            <span className="text-cyan-400">STATUS: PREVIEWING FRAME {frame}</span>
                            <span>00:05</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
